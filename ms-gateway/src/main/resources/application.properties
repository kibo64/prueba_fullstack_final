spring.application.name=ms-gateway
server.port=${PORT:8093}

eureka.client.service-url.defaultZone=http://ms-eureka:8761/eureka/
eureka.instance.prefer-ip-address=true

# AUTH
spring.cloud.gateway.server.webmvc.routes[0].id=auth
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://MS-AUTH
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/auth/**

# FACULTAD
spring.cloud.gateway.server.webmvc.routes[1].id=facultad
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://MS-FACULTAD
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/v1/facultades/**

